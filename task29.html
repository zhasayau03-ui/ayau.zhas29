<!DOCTYPE html>
<html>
<head>
  <style>
    .left {
      text-align: left;
    }

    .right {
      text-align: right;
    }

    .center {
      text-align: center;
    }

    .justify {
      text-align: justify;
    }
  </style>
</head>
<body>

<p class="left">Текст выровнен по левому краю.</p>

<p class="right">Текст выровнен по правому краю.</p>

<p class="center">Текст выровнен по центру.</p>

<p class="justify">
  Этот текст выровнен по ширине. Это значит, что он растягивается так,
  чтобы одновременно касаться и левого, и правого края блока.
</p>

</body>
</html>
